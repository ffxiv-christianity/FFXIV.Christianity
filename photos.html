<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 基督教公會 | 艾奧傑亞的團契</title>
    <link rel="stylesheet" href="css/global.css?v=260402v01">
    <link rel="stylesheet" href="css/photos.css?v=260402v01">
</head>

<body>
    <div class="menu-container">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div id="side-menu" class="side-menu">
            <a href="index.html">Home</a>
            <a href="home.html">About</a>
            <a href="photos.html" class="active">Photos</a>
            <a href="join.html">Join us</a>
            <a href="secrect.html">Secret</a>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <button class="lightbox-prev" onclick="changeLightboxImage(-1)">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img">
        <button class="lightbox-next" onclick="changeLightboxImage(1)">&#10095;</button>
    </div>

    <main>
        <section id="photos">
            <h2>公會活動</h2>

            <ul class="activity-tabs">
                <li class="tab-btn active" onclick="showSlider('church')">基督教大教堂</li>
                <li class="tab-btn" onclick="showSlider('Group')">聖徒團契</li>
                <li class="tab-btn" onclick="showSlider('event_Valentine')">情人節暨新年活動</li>
                <li class="tab-btn" onclick="showSlider('event_Christmas')">聖誕節活動</li>
            </ul>


            <div class="all-sliders">
                <div id="church" class="slider-group active">
                    <div class="carousel-wrapper">
                        <button class="prev" onclick="moveSlide('church', -1)">❮</button>
                        <div class="slider-container">
                            <div class="item"><img src="images/大聖堂1.jpg" alt="教堂1" onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/大聖堂2.jpg" alt="教堂2" onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/大聖堂3.jpg" alt="教堂3" onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/預定地合照1.jpg" alt="預定地合照1" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/預定地合照2.jpg" alt="預定地合照2" onclick="openLightbox(this)">
                            </div>
                        </div>
                        <button class="next" onclick="moveSlide('church', 1)">❯</button>
                    </div>
                    <p class="slider-note">大聖堂系列照片</p>
                </div>

                <div id="Group" class="slider-group">
                    <div class="carousel-wrapper">
                        <button class="prev" onclick="moveSlide('Group', -1)">❮</button>
                        <div class="slider-container">
                            <div class="item"><img src="images/挖寶合照1.jpg" alt="挖寶合照1" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/白袍合照1.jpg" alt="白袍合照1" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/白袍合照2.jpg" alt="白袍合照2" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/婚禮合照1.jpg" alt="婚禮合照1" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/婚禮合照2.jpg" alt="婚禮合照2" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/婚禮合照3.jpg" alt="婚禮合照3" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/婚禮合照4.jpg" alt="婚禮合照4" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/婚禮合照5.jpg" alt="婚禮合照5" onclick="openLightbox(this)">
                            </div>
                        </div>
                        <button class="next" onclick="moveSlide('Group', 1)">❯</button>
                    </div>
                    <p class="slider-note">聖徒團契合照</p>
                </div>

                <div id="event_Valentine" class="slider-group">
                    <div class="carousel-wrapper">
                        <button class="prev" onclick="moveSlide('event_Valentine', -1)">❮</button>
                        <div class="slider-container">
                            <div class="item"><img src="images/情人節/抖腳狂人鳥1.jpg" alt="抖腳狂人鳥1"
                                    onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/抖腳狂人鳥2.jpg" alt="抖腳狂人鳥2"
                                    onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/喬.jpg" alt="喬" onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/耶穌.jpg" alt="耶穌" onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/赤芍.jpg" alt="赤芍" onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/小椪皮.jpg" alt="小椪皮" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/情人節/小茶茶.jpg" alt="小茶茶" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/情人節/蟹道人.jpg" alt="蟹道人" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/情人節/大雞蛋.jpg" alt="大雞蛋" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/情人節/第三名大雞蛋.jpg" alt="第三名大雞蛋"
                                    onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/第二名小椪皮.jpg" alt="第二名小椪皮"
                                    onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/第一名小茶茶.jpg" alt="第一名小茶茶"
                                    onclick="openLightbox(this)"></div>
                            <div class="item"><img src="images/情人節/團照1.jpg" alt="團照1" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/情人節/團照2.jpg" alt="團照2" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/情人節/團照4.jpg" alt="團照3" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/情人節/團照4.jpg" alt="團照4" onclick="openLightbox(this)">
                            </div>
                        </div>
                        <button class="next" onclick="moveSlide('event_Valentine', 1)">❯</button>
                    </div>
                    <p class="slider-note">情人節暨新年活動攝影大賽</p>
                </div>

                <div id="event_Christmas" class="slider-group">
                    <div class="carousel-wrapper">
                        <button class="prev" onclick="moveSlide('event_Christmas', -1)">❮</button>
                        <div class="slider-container">
                            <div class="item"><img src="images/聖誕節合照1.jpg" alt="聖誕節合照1" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/聖誕節合照2.jpg" alt="聖誕節合照2" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/聖誕節合照3.jpg" alt="聖誕節合照3" onclick="openLightbox(this)">

                            </div>
                            <div class="item"><img src="images/聖誕節合照5.jpg" alt="聖誕節合照5" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/聖誕節合照6.jpg" alt="聖誕節合照6" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/聖誕節合照7.jpg" alt="聖誕節合照7" onclick="openLightbox(this)">

                            <div class="item"><img src="images/聖誕節合照8.jpg" alt="聖誕節合照8" onclick="openLightbox(this)">
                            </div>
                            <div class="item"><img src="images/聖誕節合照9.jpg" alt="聖誕節合照9" onclick="openLightbox(this)">
                            </div>
                        </div>
                        <button class="next" onclick="moveSlide('event_Christmas', 1)">❯</button>
                    </div>
                    <p class="slider-note">聖誕節活動紀錄</p>
                </div>
            </div>
        </section>
